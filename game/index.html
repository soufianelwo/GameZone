<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Jeu – Jeux gratuits</title>
  <meta name="description" content="">
  <meta property="og:title" content="">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="">

  <link rel="canonical" href="">
  <link rel="stylesheet" href="/css/style.css">

</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">Jeux<span>Gratuits</span></a>
    <nav>
      <a href="/">Tous les jeux</a>
      <a href="/action/">Action</a>
      <a href="/arcade/">Arcade</a>
      <a href="/battleroyale/">Battle Royale</a>
      <a href="/idle/">Idle</a>
      <a href="/puzzle/">Puzzle</a>
      <a href="/sports/">Sports</a>
    </nav>
  </header>

  <main class="game-main">

    <div class="game-layout">

      <!-- Zone principale -->
      <div class="game-center">

        <div class="game-header">
          <h1 id="game-title-h1"></h1>
        </div>

        <div class="game-frame-wrap">
          <iframe id="game-iframe" src="" allowfullscreen frameborder="0"></iframe>
        </div>

        <div class="game-actions">
          <button id="fullscreen-btn" class="btn-fullscreen">⛶ Plein écran</button>
        </div>

        <div class="game-desc-block">
          <p id="game-description" style="color:#aaa;font-size:14px;margin-top:6px;"></p>
          <p id="game-instruction" style="color:#aaa;font-size:14px;margin-top:6px;"></p>
        </div>

      </div>

      <!-- Sidebar -->
      <aside class="game-sidebar">

        <section class="sb-section">
          <h2 class="sb-title">Vous aimerez aussi</h2>
          <div id="you-may-like" class="sb-grid"></div>
        </section>

        <section class="sb-section">
          <h2 class="sb-title">Tendances</h2>
          <div id="trending" class="sb-grid"></div>
        </section>

      </aside>

    </div>

  </main>

  <!-- Data -->
  <script src="/js/aa_action_games.js"></script>
  <script src="/js/aa_arcade_games.js"></script>
  <script src="/js/aa_battleroyale_games.js"></script>
  <script src="/js/aa_idle_games.js"></script>
  <script src="/js/aa_puzzle_games.js"></script>
  <script src="/js/aa_sandbox_games.js"></script>
  <script src="/js/aa_multiplayer_games.js"></script>
  <script src="/js/aa_sports_games.js"></script>
  <script src="/js/games.js"></script>
  <script src="/js/game-page.js"></script>

</body>
</html>
